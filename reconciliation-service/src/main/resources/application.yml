server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/reconciliation
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: reconciliationScheduler
          threadPool:
            threadCount: 5
