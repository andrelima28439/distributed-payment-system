---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: payment-system
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: payment-system/frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_PAYMENT_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: PAYMENT_GATEWAY_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: payment-system
  labels:
    app: frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: frontend
  type: ClusterIP
