---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-processor-deployment
  namespace: payment-system
  labels:
    app: transaction-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: transaction-processor
  template:
    metadata:
      labels:
        app: transaction-processor
    spec:
      containers:
        - name: transaction-processor
          image: payment-system/transaction-processor:latest
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: payment-system-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: FRAUD_DETECTION_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: FRAUD_DETECTION_URL
            - name: RECONCILIATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: RECONCILIATION_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: NOTIFICATION_SERVICE_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: payment-system-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-processor-service
  namespace: payment-system
  labels:
    app: transaction-processor
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: transaction-processor
  type: ClusterIP
