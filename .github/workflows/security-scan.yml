name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  snyk-scan:
    strategy:
      matrix:
        service:
          - payment-gateway
          - transaction-processor
          - notification-service
          - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ${{ matrix.service }}
      - uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --directory=${{ matrix.service }} --severity-threshold=high --json-file-output=snyk-${{ matrix.service }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ matrix.service }}
          path: snyk-${{ matrix.service }}.json

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  npm-audit:
    strategy:
      matrix:
        service:
          - payment-gateway
          - transaction-processor
          - notification-service
          - frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ${{ matrix.service }}
      - run: npm audit --audit-level=high
        continue-on-error: true
        working-directory: ${{ matrix.service }}

  pip-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fraud-detection
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            fraud-detection/requirements.txt
            fraud-detection/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pip install pip-audit
      - run: pip-audit --desc on
        continue-on-error: true
