name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-js-services:
    strategy:
      matrix:
        service:
          - payment-gateway
          - transaction-processor
          - notification-service
          - frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage/

  test-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fraud-detection
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/fraud-detection/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: flake8 .
      - run: pytest --cov=./ --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-fraud-detection
          path: services/fraud-detection/coverage.xml

  test-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reconciliation-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
      - run: mvn clean verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-reconciliation-service
          path: services/reconciliation-service/target/surefire-reports/
