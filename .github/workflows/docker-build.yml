name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG_SHA: ${{ github.sha }}

jobs:
  build-and-push:
    strategy:
      matrix:
        image:
          - name: payment-gateway
            dockerfile: payment-gateway/Dockerfile
            context: payment-gateway
          - name: transaction-processor
            dockerfile: transaction-processor/Dockerfile
            context: transaction-processor
          - name: fraud-detection
            dockerfile: fraud-detection/Dockerfile
            context: fraud-detection
          - name: reconciliation-service
            dockerfile: reconciliation-service/Dockerfile
            context: reconciliation-service
          - name: notification-service
            dockerfile: notification-service/Dockerfile
            context: notification-service
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ env.IMAGE_TAG_SHA }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
