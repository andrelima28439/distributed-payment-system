name: Kubernetes Deploy

on:
  workflow_run:
    workflows: ["Docker Build"]
    types:
      - completed
    branches: [main]

env:
  KUBE_NAMESPACE: payment-system
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply ConfigMap and Secrets
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

      - name: Apply database deployments
        run: |
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/rabbitmq-deployment.yaml

      - name: Wait for databases
        run: |
          kubectl wait --for=condition=ready pod -l app=postgres -n ${{ env.KUBE_NAMESPACE }} --timeout=180s
          kubectl wait --for=condition=ready pod -l app=redis -n ${{ env.KUBE_NAMESPACE }} --timeout=120s
          kubectl wait --for=condition=ready pod -l app=rabbitmq -n ${{ env.KUBE_NAMESPACE }} --timeout=120s

      - name: Apply service deployments
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          for dep in payment-gateway transaction-processor fraud-detection reconciliation-service notification-service frontend; do
            sed "s|\${IMAGE_TAG}|$IMAGE_TAG|g" k8s/${dep}-deployment.yaml | kubectl apply -f -
          done

      - name: Apply HPA and NetworkPolicies
        run: |
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/network-policy.yaml

      - name: Apply Ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Verify rollout status
        run: |
          deployments=(payment-gateway transaction-processor fraud-detection reconciliation-service notification-service frontend)
          for dep in "${deployments[@]}"; do
            kubectl rollout status deployment/$dep -n ${{ env.KUBE_NAMESPACE }} --timeout=300s
          done

      - name: Post-deploy health checks
        run: |
          endpoints=(
            "payment-gateway:8080/health"
            "transaction-processor:8081/health"
            "fraud-detection:8082/health"
            "reconciliation-service:8083/health"
            "notification-service:8084/health"
            "frontend:80/health"
          )
          for ep in "${endpoints[@]}"; do
            kubectl run health-check-${{ github.run_id }} \
              --image=curlimages/curl \
              --restart=Never \
              --command -- sh -c "curl -sf http://${ep}" \
              -n ${{ env.KUBE_NAMESPACE }}
            kubectl wait --for=condition=completed pod/health-check-${{ github.run_id }} \
              -n ${{ env.KUBE_NAMESPACE }} --timeout=30s
            kubectl delete pod health-check-${{ github.run_id }} -n ${{ env.KUBE_NAMESPACE }}
          done
