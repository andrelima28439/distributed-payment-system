version: '3.8'

networks:
  payment-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

services:
  # ===================== INFRASTRUCTURE =====================
  postgres:
    image: postgres:15-alpine
    container_name: payment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    networks:
      - payment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: payment-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===================== MICROSERVICES =====================
  payment-gateway:
    build:
      context: ./payment-gateway
      dockerfile: Dockerfile
    container_name: payment-gateway
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      API_KEY: pk_test_abcdef123456
      JWT_SECRET: jwt_secret_change_in_production
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped

  transaction-processor:
    build:
      context: ./transaction-processor
      dockerfile: Dockerfile
    container_name: transaction-processor
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      FRAUD_DETECTION_URL: http://fraud-detection:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      RECONCILIATION_SERVICE_URL: http://reconciliation-service:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped

  fraud-detection:
    build:
      context: ./fraud-detection
      dockerfile: Dockerfile
    container_name: fraud-detection
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fraud_detection
      MODEL_PATH: /app/models/fraud_model.joblib
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped

  reconciliation-service:
    build:
      context: ./reconciliation-service
      dockerfile: Dockerfile
    container_name: reconciliation-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reconciliation
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RESEND_API_KEY: re_placeholder
      TWILIO_ACCOUNT_SID: placeholder
      TWILIO_AUTH_TOKEN: placeholder
      TWILIO_PHONE_NUMBER: "+15555555555"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payment-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3004
    depends_on:
      - payment-gateway
    networks:
      - payment-network
    restart: unless-stopped
